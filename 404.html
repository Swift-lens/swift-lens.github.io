<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — SwiftLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0f0f0f; --ink-muted: #7a7a7a; --line: #e8e8e8; --bg: #fafaf8; --accent: #1a56db; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 40px; -webkit-font-smoothing: antialiased;
    }
    .code {
      font-family: 'Instrument Serif', serif; font-size: 7rem;
      line-height: 1; letter-spacing: -.04em; color: var(--line);
      margin-bottom: 16px;
    }
    h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; letter-spacing: -.02em; margin-bottom: 12px; }
    p { color: var(--ink-muted); margin-bottom: 32px; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--ink); color: #fff;
      padding: 12px 24px; border-radius: 10px;
      font-weight: 600; text-decoration: none; transition: background .15s;
    }
    a:hover { background: #333; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="index.html">← Back to SwiftLens</a>
</body>
</html>
