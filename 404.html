<!DOCTYPE html>

  <style>
    @font-face {
      font-family: 'Bahnschrift SemiBold SemiConden';
      src: local('Bahnschrift SemiBold SemiConden'), local('Bahnschrift');
      font-weight: 600;
      font-stretch: semi-condensed;
    }
    :root { --ink: #0f0f0f; --ink-muted: #7a7a7a; --line: #e8e8e8; --bg: #fafaf8; --accent: #1a56db; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Bahnschrift SemiBold SemiConden', sans-serif; background: var(--bg); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 40px; -webkit-font-smoothing: antialiased;
    }
    .code {
      font-family: 'Bahnschrift SemiBold SemiConden', sans-serif; font-size: 7rem;
      line-height: 1; letter-spacing: -.04em; color: #4a4a4a;
      margin: 0 auto 16px; text-align: center;
    }
    h1 {
      font-family: 'Bahnschrift SemiBold SemiConden', sans-serif; font-size: 2rem; letter-spacing: -.02em;
      margin: 0 auto 12px; text-align: center;
    }
    p {
      color: var(--ink-muted); margin: 0 auto 32px; text-align: center;
      max-width: 500px;
    }
    .action-links {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--ink); color: #fff;
      padding: 12px 24px; border-radius: 10px;
      font-weight: 600; text-decoration: none; transition: background .15s;
    }
    a:hover { background: #333; }
    .social-links {
      margin-top: 32px; margin-left: 80px; display: flex; gap: 16px; justify-content: center;
    }
    .social-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: 1.5rem; text-decoration: none;
      transition: background .15s, transform .15s;
      padding: 0;
    }
    .social-icon:hover { background: #1449c4; transform: scale(1.1); }
    .instagram-icon { background: #E4405F; }
    .instagram-icon:hover { background: #d13175; }
